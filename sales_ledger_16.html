<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매출 장부</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="매출 장부">
<meta name="theme-color" content="#0a0a0f">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bg4:#20202a;--border:#2a2a38;--border2:#38384a;--accent:#7c6ff7;--accent2:#a99ef8;--accent3:#5a4fe0;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;--orange:#fb923c;--pink:#f472b6;--text:#e8e8f0;--text2:#9898b0;--text3:#606078;--radius:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;}
.header-title{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--accent2);}
.header-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto;}
.tab{padding:11px 16px;cursor:pointer;color:var(--text3);font-size:13px;font-weight:500;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.main{display:grid;grid-template-columns:345px 1fr;min-height:calc(100vh - 108px);}
.panel-left{background:var(--bg2);border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:calc(100vh - 108px);}
.panel-right{padding:18px;overflow-y:auto;max-height:calc(100vh - 108px);}
.section{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;}
.sec-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:10px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:space-between;}
/* room */
.room-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.room-btn{background:var(--bg4);border:1px solid var(--border);border-radius:7px;padding:9px 4px;text-align:center;cursor:pointer;transition:all .15s;font-weight:700;font-size:15px;color:var(--text2);font-family:'JetBrains Mono',monospace;}
.room-btn:hover{border-color:var(--accent3);color:var(--text);}
.room-btn.active{background:var(--accent3);border-color:var(--accent);color:#fff;box-shadow:0 0 0 2px rgba(124,111,247,.22);}
.room-count{font-size:10px;font-weight:400;opacity:.65;display:block;margin-top:1px;font-family:'Noto Sans KR',sans-serif;}
/* picker */
.picker-search{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;margin-bottom:7px;outline:none;transition:border-color .15s;}
.picker-search:focus{border-color:var(--accent);}
.picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;max-height:155px;overflow-y:auto;}
.picker-btn{background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:5px 3px;text-align:center;cursor:pointer;font-size:11px;color:var(--text2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .1s;}
.picker-btn:hover{border-color:var(--border2);color:var(--text);}
.picker-btn.sel-booker{background:#2a0a1a;border-color:var(--pink);color:var(--pink);}
.picker-btn.sel-staff{background:#1a1a4a;border-color:var(--accent);color:var(--accent2);}
.picker-btn.sel-both{background:#1e1035;border-color:var(--accent2);color:#fff;}
.picker-btn.is-manager{border-color:#3a2a1a;}
.picker-btn.is-walkin{border-color:#2a1a3a;color:#c084fc;}
.picker-btn.sel-booker.is-walkin{background:#1a0a2e;border-color:#c084fc;color:#c084fc;}
/* tags */
.tags-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;min-height:16px;}
.tag{border-radius:20px;padding:3px 9px;font-size:11px;display:flex;align-items:center;gap:4px;}
.tag-booker{background:#2a0a1a;border:1px solid #be185d;color:var(--pink);}
.tag-staff{background:#1a1a4a;border:1px solid var(--accent3);color:var(--accent2);}
.tag .remove{cursor:pointer;opacity:.5;font-size:13px;line-height:1;}
.tag .remove:hover{opacity:1;}
/* btype badge */
.btype-badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--bg4);color:var(--text3);transition:all .2s;}
.btype-badge.bt-1p{background:#0c2a1a;border-color:var(--green);color:var(--green);}
.btype-badge.bt-2p{background:#0a1f3a;border-color:var(--blue);color:var(--blue);}
.btype-badge.bt-walkin{background:#1a0a2e;border-color:#c084fc;color:#c084fc;}
/* payment */
.toggle-group{display:flex;gap:5px;flex-wrap:wrap;}
.toggle-btn{padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg4);color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;}
.toggle-btn:hover{border-color:var(--border2);color:var(--text);}
.t-cash.active{background:#064e3b;border-color:var(--green);color:var(--green);}
.t-card.active{background:#1e3a5f;border-color:var(--blue);color:var(--blue);}
.t-upi.active{background:#451a03;border-color:var(--yellow);color:var(--yellow);}
.t-mix.active{background:#431407;border-color:var(--orange);color:var(--orange);}
/* country/pax toggles */
.country-group{display:flex;gap:4px;flex-wrap:wrap;}
.cty-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg4);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;transition:all .15s;}
.cty-btn:hover{border-color:var(--border2);color:var(--text);}
.cty-btn.active{background:#1a2a3a;border-color:var(--blue);color:var(--blue);}
.pax-group{display:flex;gap:3px;flex-wrap:wrap;}
.pax-btn{padding:5px 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg4);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;transition:all .15s;min-width:34px;text-align:center;}
.pax-btn:hover{border-color:var(--border2);color:var(--text);}
.pax-btn.active{background:#1a2a1a;border-color:var(--green);color:var(--green);}
/* inputs */
.amt-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ig{display:flex;flex-direction:column;gap:4px;}
.ig-label{font-size:11px;color:var(--text3);font-weight:500;}
.input-field{background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;width:100%;transition:border-color .15s;}
.input-field:focus{border-color:var(--accent);}
.input-field::placeholder{color:var(--text3);}
.note-field{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;resize:vertical;min-height:52px;outline:none;font-family:'Noto Sans KR',sans-serif;transition:border-color .15s;}
.note-field:focus{border-color:var(--accent);}
/* buttons */
.btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);color:#111;}
.btn-danger{background:#7f1d1d;color:var(--red);}
.btn-danger:hover{background:#991b1b;}
.btn-ghost{background:var(--bg4);border:1px solid var(--border);color:var(--text2);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}
.btn-success{background:#064e3b;color:var(--green);}
.btn-success:hover{background:#065f46;}
.btn-full{width:100%;}
.btn-sm{padding:5px 11px;font-size:12px;}
/* table */
.rec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;flex-wrap:wrap;gap:8px;}
.rec-title{font-size:15px;font-weight:700;}
.filter-bar{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead{background:var(--bg3);}
th{padding:8px 10px;text-align:left;color:var(--text3);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.018);}
.mono{font-family:'JetBrains Mono',monospace;}
.badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.b-cash{background:#064e3b;color:var(--green);}
.b-card{background:#1e3a5f;color:var(--blue);}
.b-upi{background:#451a03;color:var(--yellow);}
.b-mix{background:#2d1a4a;color:var(--accent2);}
.b-walkin{background:#1a0a2e;color:#c084fc;}
.b-1p{background:#0c2a1a;color:#6ee7b7;}
.b-2p{background:#0a1f3a;color:var(--blue);}
/* country badge */
.cty-badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;background:#1a2a3a;color:var(--blue);}
/* total bar */
.total-bar{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;gap:18px;margin-bottom:12px;flex-wrap:wrap;}
.ti-label{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.ti-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;margin-top:2px;}
/* stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px;margin-bottom:14px;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:13px;}
.stat-label{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-family:'JetBrains Mono',monospace;}
.stat-value{font-size:21px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px;}
/* sum section */
.sum-sec{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-bottom:12px;}
.sum-sec-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border);padding-bottom:7px;}
.room-pills{display:flex;gap:5px;flex-wrap:wrap;}
.room-pill{background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:6px 11px;display:flex;gap:7px;align-items:center;}
/* staff stats */
.ss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:6px;}
.ss-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;}
.ss-name{font-size:12px;font-weight:700;color:var(--accent2);margin-bottom:2px;}
.ss-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--green);}
.ss-cnt{font-size:11px;color:var(--text3);margin-top:2px;}
/* manage */
.manage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:5px;}
.mg-item{background:var(--bg4);border:1px solid var(--border);border-radius:7px;padding:7px 9px;display:flex;align-items:center;justify-content:space-between;gap:5px;font-size:12px;}
.mg-item.is-manager{border-color:#3a2a1a;}
.mg-item.is-walkin{border-color:#2a1a3a;color:#c084fc;}
.mg-name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.del-s-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;line-height:1;padding:0 1px;flex-shrink:0;}
.del-s-btn:hover{color:var(--red);}
.add-row{display:flex;gap:7px;margin-bottom:12px;align-items:center;}
.add-row .input-field{flex:1;}
.mgr-check{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;}
.mgr-check input{accent-color:var(--yellow);width:13px;height:13px;cursor:pointer;}
/* row actions */
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;}
.del-btn:hover{color:var(--red);background:rgba(248,113,113,.1);}
.edit-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px;}
.edit-btn:hover{color:var(--accent2);background:rgba(124,111,247,.1);}
/* inline edit for amount */
.inline-edit{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg4);border:1px solid var(--accent3);border-radius:4px;color:var(--text);padding:2px 6px;width:90px;outline:none;}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:21px;max-width:350px;width:90%;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:8px;}
.modal-body{color:var(--text2);font-size:13px;margin-bottom:16px;line-height:1.6;}
.modal-actions{display:flex;gap:7px;justify-content:flex-end;}
/* toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--accent);border-radius:8px;padding:10px 17px;color:var(--text);font-size:13px;z-index:9999;animation:slideIn .2s ease;pointer-events:none;}
@keyframes slideIn{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.tab-content{display:none;}
.tab-content.active{display:block;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
/* pending badge on amount cell */
.amt-pending{color:var(--text3);font-style:italic;font-size:11px;}
@media(max-width:820px){.main{grid-template-columns:1fr;}.panel-left{max-height:none;border-right:none;border-bottom:1px solid var(--border);}.panel-right{max-height:none;}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="header">
  <div class="header-title">💰 매출 장부</div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="display:flex;gap:12px;align-items:center;"><span id="syncStatus" style="font-size:11px;font-family:'JetBrains Mono',monospace;">⏳ 연결 중...</span><div class="header-date" id="headerDate"></div></div>
    <div style="display:flex;gap:7px;">
      <button class="btn btn-ghost btn-sm" onclick="exportToClipboard()">📋 클립보드</button>
      <button class="btn btn-success btn-sm" onclick="downloadExport()">⬇ 엑셀 다운로드</button>
    </div>
  </div>
</div>
<div class="tabs">
  <div class="tab active"  onclick="switchTab('entry')">📝 입력</div>
  <div class="tab"         onclick="switchTab('records')">📊 전체 장부</div>
  <div class="tab"         onclick="switchTab('summary')">📈 요약</div>
  <div class="tab"         onclick="switchTab('staffstats')">👥 스태프 통계</div>
  <div class="tab"         onclick="switchTab('manage')">⚙ 스태프 관리</div>
</div>

<div class="main">
  <!-- LEFT PANEL -->
  <div class="panel-left">

    <div class="section">
      <div class="sec-title">룸 선택</div>
      <div class="room-grid" id="roomGrid"></div>
    </div>

    <div class="section">
      <div class="sec-title">부킹자 <span class="btype-badge" id="btypeBadge">-</span></div>
      <input class="picker-search" id="bookerSearch" placeholder="검색..." oninput="renderPickers()">
      <div class="picker-grid" id="bookerGrid"></div>
      <div class="tags-row" id="bookerTags"></div>
    </div>

    <div class="section">
      <div class="sec-title">셀렉션 <span style="font-size:9px;opacity:.55">(다중)</span></div>
      <input class="picker-search" id="staffSearch" placeholder="검색..." oninput="renderPickers()">
      <div class="picker-grid" id="staffGrid"></div>
      <div class="tags-row" id="staffTags"></div>
    </div>

    <!-- 나라 / 인원수 -->
    <div class="section">
      <div class="sec-title" style="margin-bottom:8px;">나라</div>
      <div class="country-group" id="countryGroup">
        <button class="cty-btn" data-v="J"   onclick="setCountry('J',this)">J</button>
        <button class="cty-btn" data-v="K"   onclick="setCountry('K',this)">K</button>
        <button class="cty-btn" data-v="C"   onclick="setCountry('C',this)">C</button>
        <button class="cty-btn" data-v="I"   onclick="setCountry('I',this)">I</button>
        <button class="cty-btn" data-v="ETC" onclick="setCountry('ETC',this)">ETC</button>
      </div>
      <div class="sec-title" style="margin-top:11px;margin-bottom:8px;">인원수</div>
      <div class="pax-group" id="paxGroup"></div>
    </div>

    <!-- 금액 -->
    <div class="section">
      <div class="sec-title">금액 <span style="font-size:9px;opacity:.55;font-family:'Noto Sans KR'">(나중에 입력 가능)</span></div>
      <input class="input-field" type="number" id="amtSingle" placeholder="금액 (선택)" style="margin-bottom:8px;" oninput="calcTotal()">
    </div>

    <!-- 결제 -->
    <div class="section">
      <div class="sec-title">결제 방식 <span style="font-size:9px;opacity:.55;font-family:'Noto Sans KR'">(선택)</span></div>
      <div class="toggle-group" style="margin-bottom:9px;">
        <button class="toggle-btn t-cash" onclick="setPayment('CASH',this)">CASH</button>
        <button class="toggle-btn t-card" onclick="setPayment('CARD',this)">CARD</button>
        <button class="toggle-btn t-upi"  onclick="setPayment('UPI',this)">UPI</button>
        <button class="toggle-btn t-mix"  onclick="setPayment('MIX',this)">혼합</button>
      </div>
      <div id="mixWrap" style="display:none;">
        <div class="amt-grid">
          <div class="ig"><div class="ig-label" style="color:var(--green)">CASH</div><input class="input-field" type="number" id="amtCash" placeholder="0" oninput="calcTotal()"></div>
          <div class="ig"><div class="ig-label" style="color:var(--blue)">CARD</div><input class="input-field" type="number" id="amtCard" placeholder="0" oninput="calcTotal()"></div>
          <div class="ig"><div class="ig-label" style="color:var(--yellow)">UPI</div><input class="input-field" type="number" id="amtUPI" placeholder="0" oninput="calcTotal()"></div>
          <div class="ig"><div class="ig-label" style="color:var(--accent2)">합계</div><input class="input-field" type="number" id="amtTotal" placeholder="0" readonly style="opacity:.5;"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">체크인 / 체크아웃</div>
      <div class="two-col">
        <div class="ig"><div class="ig-label">체크인</div><input class="input-field" type="time" id="checkinTime"></div>
        <div class="ig"><div class="ig-label">체크아웃</div><input class="input-field" type="time" id="checkoutTime"></div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">메모 / 날짜</div>
      <textarea class="note-field" id="noteField" placeholder="메모..." style="margin-bottom:7px;"></textarea>
      <input class="input-field" type="date" id="entryDate">
    </div>

    <button class="btn btn-primary btn-full" onclick="submitEntry()" style="font-size:15px;padding:13px;">✚ 기록 저장</button>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">

    <div id="tab-entry" class="tab-content active">
      <div class="rec-header">
        <div class="rec-title">오늘의 장부</div>
        <div class="filter-bar">
          <input class="input-field" type="date" id="filterDate" onchange="renderTable()" style="font-size:11px;width:auto;">

        <thead><tr><th>#</th><th>날짜</th><th>룸</th><th>부킹자</th><th>금액</th><th>결제</th><th>나라</th><th>인원</th><th>셀렉션</th><th>체크인</th><th>체크아웃</th><th>메모</th><th></th></tr></thead>
        <tbody id="recordsBody"></tbody>

    <div id="tab-records" class="tab-content">

        </div>

      <div class="total-bar" id="totalBar2"></div>
      <div class="table-wrap"><table>
        <thead><tr><th>#</th><th>날짜</th><th>룸</th><th>부킹자</th><th>금액</th><th>결제</th><th>나라</th><th>인원</th><th>셀렉션</th><th>체크인</th><th>체크아웃</th><th>메모</th><th></th></tr></thead>
        <tbody id="recordsBody2"></tbody>
      </table></div>
    </div>

    <div id="tab-summary" class="tab-content">
      <div class="rec-header">
        <div class="rec-title">요약 통계</div>
        <div class="filter-bar">
          <input class="input-field" type="date" id="filterDate3" onchange="renderSummary()" style="font-size:11px;width:auto;">
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('filterDate3').value='';renderSummary()">전체</button>
        </div>
      </div>
      <div id="summaryContent"></div>
    </div>

    <div id="tab-staffstats" class="tab-content">
      <div class="rec-header">
        <div class="rec-title">스태프 통계</div>
        <div class="filter-bar">
          <input class="input-field" type="date" id="filterDate4" onchange="renderStaffStats()" style="font-size:11px;width:auto;">
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('filterDate4').value='';renderStaffStats()">전체</button>
        </div>
      </div>
      <div id="staffStatsContent"></div>
    </div>

    <div id="tab-manage" class="tab-content">
      <div class="rec-header"><div class="rec-title">스태프 관리</div></div>
      <div class="add-row">
        <input class="input-field" type="text" id="newStaffName" placeholder="이름 (영문 대문자)" oninput="this.value=this.value.toUpperCase()">
        <label class="mgr-check"><input type="checkbox" id="newStaffMgr"> 매니저</label>
        <button class="btn btn-primary btn-sm" onclick="addStaff()">+ 추가</button>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:11px;">🚶 WALKIN은 삭제 불가 · 🌟 매니저</div>
      <div class="manage-grid" id="staffManageGrid"></div>
    </div>

  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">확인</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-danger" id="modalConfirm">삭제</button>
    </div>
  </div>
</div>

<script type="module">
// Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, remove }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0MehTEqcHuBIHEBjYGbwoirJhYP7Mo6o",
  authDomain: "aplus-sales-ledger.firebaseapp.com",
  databaseURL: "https://aplus-sales-ledger-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aplus-sales-ledger",
  storageBucket: "aplus-sales-ledger.firebasestorage.app",
  messagingSenderId: "171577762626",
  appId: "1:171577762626:web:341b648653283ae18f5edb"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const DEFAULT_STAFF=['WALKIN','ABUN','AKA','ALO','AJUNG','ANABO','ANNIE','ATI','BIBI','CATHERINE','CINDY','DAUDAU','DINDIN','ELLI','ELO','ELYSIA','EVIE','FIONA','GRACE','HENNA','JENJEN','JENNY','JESSICA','KAKA','KAKA2','KANI','KEMCHI','KIMKIM','KUKU','LINA','LUCY','MIMI','MARIA','MOII','NINI','NINGNING','NUNU','RUDDY','SEDE','SEMSEM','SEYA','SHILA','SISI','TUSHILA','VINA','WANGWANG','WIWI','ZAIZAI','ZOEY','ADI','AIEN','ALICE','BERNI','KIPI','KIPWA','SUNIN CA','ALI','ALEM','RAFIC','RAZ','PARBIN','SUSIL','SAGAL','ROHIT'];
const DEFAULT_MGR=['ADI','AIEN','ALICE','BERNI','KIPI','KIPWA'];
const COUNTRIES=['J','K','C','I','ETC'];

let records=[],staffList=[...DEFAULT_STAFF],managerList=[...DEFAULT_MGR];
let selRoom=null,selPayment=null,selBookers=[],selStaff=[],selCountry='',selPax=0,editId=null;
let _pdid=null,_tt=null;

function saveRecordDB(rec){ set(ref(db,'records/'+rec.id), rec); }
function deleteRecordDB(id){ remove(ref(db,'records/'+id)); }
function saveStaffDB(){
  // always sort before saving
  const sorted=[...staffList].sort((a,b)=>{if(a==='WALKIN')return -1;if(b==='WALKIN')return 1;return a.localeCompare(b);});
  staffList=sorted;
  set(ref(db,'config/staffList'), staffList);
  set(ref(db,'config/managerList'), managerList);
}
function setStatus(on){
  const el=document.getElementById('syncStatus');
  if(!el)return;
  el.textContent=on?'🟢 실시간 연결됨':'🔴 연결 끊김';
  el.style.color=on?'var(--green)':'var(--red)';
}

function init(){
  document.getElementById('headerDate').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  const today=new Date().toISOString().split('T')[0];
  ['entryDate','filterDate','filterDate3','filterDate4'].forEach(id=>document.getElementById(id).value=today);
  buildRoomGrid();
  buildPaxGrid();
  renderPickers();
  setStatus(false);
  onValue(ref(db,'records'),snap=>{
    records=[];
    if(snap.exists()){
      snap.forEach(child=>{
        const v=child.val();
        if(v&&v.id) records.push(v);
      });
    }
    setStatus(true);
    renderTable();renderTable2();refreshRoomCounts();
  });
  onValue(ref(db,'config/staffList'),snap=>{
    if(snap.exists()&&Array.isArray(snap.val())){
      staffList=snap.val();
    } else {
      // First time: save defaults to Firebase
      saveStaffDB();
    }
    renderPickers();renderManageGrid();
  });
  onValue(ref(db,'config/managerList'),snap=>{
    if(snap.exists()&&Array.isArray(snap.val())){
      managerList=snap.val();
    }
    renderPickers();renderManageGrid();
  });
}

// ROOM
function buildRoomGrid(){
  const g=document.getElementById('roomGrid');g.innerHTML='';
  for(let i=1;i<=9;i++){const b=document.createElement('button');b.className='room-btn';b.id='rb'+i;b.onclick=()=>selectRoom(i);g.appendChild(b);}
  refreshRoomCounts();
}
function refreshRoomCounts(){
  for(let i=1;i<=9;i++){const b=document.getElementById('rb'+i);if(!b)continue;const cnt=records.filter(r=>r.room==i).length;b.innerHTML=`${i}<span class="room-count">${cnt}건</span>`;b.className='room-btn'+(selRoom==i?' active':'');}
}
function selectRoom(n){selRoom=n;refreshRoomCounts();}

// PAX GRID
function buildPaxGrid(){
  const g=document.getElementById('paxGroup');g.innerHTML='';
  for(let i=1;i<=10;i++){const b=document.createElement('button');b.className='pax-btn'+(selPax===i?' active':'');b.textContent=i;b.onclick=()=>setPax(i);g.appendChild(b);}
}
function setPax(n){selPax=(selPax===n?0:n);buildPaxGrid();}
function setCountry(v,el){
  selCountry=(selCountry===v?'':v);
  document.querySelectorAll('.cty-btn').forEach(b=>b.classList.toggle('active',b.dataset.v===selCountry));
}

// PICKERS
function renderPickers(){
  const bq=(document.getElementById('bookerSearch').value||'').toLowerCase();
  const sq=(document.getElementById('staffSearch').value||'').toLowerCase();
  _renderGrid('bookerGrid',bq,true);
  _renderGrid('staffGrid',sq,false);
  _renderBookerTags();
  _renderStaffTags();
  _updateBadge();
}
function _renderGrid(gid,q,isBooker){
  const g=document.getElementById(gid);g.innerHTML='';
  staffList.filter(s=>s.toLowerCase().includes(q)).forEach(s=>{
    const isMgr=managerList.includes(s),isWk=s==='WALKIN';
    const inB=selBookers.includes(s),inS=selStaff.includes(s);
    const btn=document.createElement('button');
    let cls='picker-btn';
    if(isWk)cls+=' is-walkin';else if(isMgr)cls+=' is-manager';
    if(inB&&inS)cls+=' sel-both';else if(inB)cls+=' sel-booker';else if(inS)cls+=' sel-staff';
    btn.className=cls;
    btn.title=(isMgr?'매니저 · ':'')+s;
    btn.textContent=(isWk?'🚶':isMgr?'🌟':'')+s;
    btn.onclick=()=>isBooker?toggleBooker(s):toggleStaff(s);
    g.appendChild(btn);
  });
}
function toggleBooker(n){
  if(n==='WALKIN'){selBookers=selBookers.includes('WALKIN')?[]:['WALKIN'];}
  else{
    if(selBookers.includes('WALKIN'))selBookers=[];
    if(selBookers.includes(n))selBookers=selBookers.filter(x=>x!==n);
    else if(selBookers.length<2)selBookers.push(n);
    else{showToast('⚠ 부킹자는 최대 2명');return;}
  }
  renderPickers();
}
function toggleStaff(n){selStaff=selStaff.includes(n)?selStaff.filter(x=>x!==n):[...selStaff,n];renderPickers();}
function _renderBookerTags(){
  const c=document.getElementById('bookerTags');c.innerHTML='';
  selBookers.forEach(s=>{const isWk=s==='WALKIN';const t=document.createElement('div');t.className='tag tag-booker';if(isWk){t.style.borderColor='#c084fc';t.style.color='#c084fc';}t.innerHTML=`${isWk?'🚶':managerList.includes(s)?'🌟':''}${s} <span class="remove" onclick="toggleBooker('${s.replace(/'/g,"\\'")}')">×</span>`;c.appendChild(t);});
}
function _renderStaffTags(){
  const c=document.getElementById('staffTags');c.innerHTML='';
  selStaff.forEach(s=>{const isMgr=managerList.includes(s);const t=document.createElement('div');t.className='tag tag-staff';if(isMgr){t.style.borderColor='#a16207';t.style.color='var(--yellow)';}t.innerHTML=`${isMgr?'🌟':''}${s} <span class="remove" onclick="toggleStaff('${s.replace(/'/g,"\\'")}')">×</span>`;c.appendChild(t);});
}
function _updateBadge(){
  const b=document.getElementById('btypeBadge');const bt=getBookingType();
  b.textContent=bt||'-';b.className='btype-badge'+(bt==='1P'?' bt-1p':bt==='2P'?' bt-2p':bt==='WALKIN'?' bt-walkin':'');
}
function getBookingType(){
  if(selBookers.includes('WALKIN'))return'WALKIN';
  if(selBookers.length===2)return'2P';
  if(selBookers.length===1)return'1P';
  return'';
}

// PAYMENT
function setPayment(v,el){
  selPayment=(selPayment===v?null:v);
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  if(selPayment)el.classList.add('active');
  document.getElementById('mixWrap').style.display=selPayment==='MIX'?'block':'none';
}
function calcTotal(){
  const c=+document.getElementById('amtCash').value||0,k=+document.getElementById('amtCard').value||0,u=+document.getElementById('amtUPI').value||0;
  document.getElementById('amtTotal').value=c+k+u;
  // sync to amtSingle for MIX
  if(selPayment==='MIX') document.getElementById('amtSingle').value=c+k+u||'';
}

// SUBMIT — amount optional
function submitEntry(){
  if(!selRoom){showToast('⚠ 룸을 선택해주세요');return;}
  let cash=0,card=0,upi=0,total=0;
  if(selPayment==='MIX'){
    cash=+document.getElementById('amtCash').value||0;
    card=+document.getElementById('amtCard').value||0;
    upi=+document.getElementById('amtUPI').value||0;
    total=cash+card+upi;
  } else {
    total=+document.getElementById('amtSingle').value||0;
    if(selPayment==='CASH')cash=total;
    else if(selPayment==='CARD')card=total;
    else if(selPayment==='UPI')upi=total;
  }
  const now=new Date();
  const time=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const rec={
    id:editId||Date.now().toString(),time,
    date:document.getElementById('entryDate').value,
    room:selRoom,
    bookers:[...selBookers],
    booking:getBookingType(),
    payment:selPayment||'',
    total,cash,card,upi,
    country:selCountry,
    pax:selPax,
    staff:[...selStaff],
    checkin:document.getElementById('checkinTime').value,
    checkout:document.getElementById('checkoutTime').value,
    note:document.getElementById('noteField').value,
  };
  saveRecordDB(rec);
  if(editId){editId=null;}
  resetForm();showToast('✓ 저장되었습니다');
}

function resetForm(){
  selRoom=null;selPayment=null;selBookers=[];selStaff=[];selCountry='';selPax=0;
  refreshRoomCounts();
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.cty-btn').forEach(b=>b.classList.remove('active'));
  buildPaxGrid();
  ['amtSingle','amtCash','amtCard','amtUPI','amtTotal'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('checkinTime').value='';document.getElementById('checkoutTime').value='';
  document.getElementById('noteField').value='';document.getElementById('bookerSearch').value='';document.getElementById('staffSearch').value='';
  document.getElementById('mixWrap').style.display='none';
  renderPickers();
}

// TABLE
function filteredRecs(did,rid){
  const date=did?(document.getElementById(did)?.value||''):'';
  const room=rid?(document.getElementById(rid)?.value||''):'';
  return records.filter(r=>(!date||r.date===date)&&(!room||r.room==room)).sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
}
function renderTotalBar(recs,bid){
  const tot=recs.reduce((s,r)=>s+r.total,0),cash=recs.reduce((s,r)=>s+r.cash,0),card=recs.reduce((s,r)=>s+r.card,0),upi=recs.reduce((s,r)=>s+r.upi,0);
  document.getElementById(bid).innerHTML=[['TOTAL',tot,'var(--accent2)'],['CASH',cash,'var(--green)'],['CARD',card,'var(--blue)'],['UPI',upi,'var(--yellow)'],['건수',recs.length,'var(--text2)']].map(([l,v,c])=>`<div><div class="ti-label">${l}</div><div class="ti-val" style="color:${c}">${typeof v==='number'?v.toLocaleString():v}</div></div>`).join('');
}

function pmBadgeClass(p){return{CASH:'b-cash',CARD:'b-card',UPI:'b-upi',MIX:'b-mix'}[p]||'';}

// Amount cell: clickable to open inline edit if empty
function amtCell(r){
  if(r.total>0) return `<span class="mono" style="font-weight:700;color:var(--green)">${r.total.toLocaleString()}</span>`;
  return `<span class="amt-pending" onclick="inlineEditAmt('${r.id}')" style="cursor:pointer;color:var(--text3);">미입력 ✎</span>`;
}
function pmCell(r){
  if(!r.payment) return `<span class="amt-pending" onclick="inlineEditPm('${r.id}')" style="cursor:pointer;color:var(--text3);">미입력 ✎</span>`;
  return `<span class="badge ${pmBadgeClass(r.payment)}">${r.payment}</span>`;
}

function buildRow(r,i,_rowTotal){
  const bHtml=(r.bookers||[]).filter(Boolean).map(s=>s==='WALKIN'?`<span style="color:#c084fc">🚶WLK</span>`:managerList.includes(s)?`<span style="color:var(--yellow)">🌟${s}</span>`:`<span style="color:var(--pink)">${s}</span>`).join(', ');
  const sHtml=(r.staff||[]).map(s=>managerList.includes(s)?`<span style="color:var(--yellow)">🌟${s}</span>`:`<span style="color:var(--text2)">${s}</span>`).join(', ');
  const ctyHtml=r.country?`<span class="cty-badge">${r.country}</span>`:'<span style="color:var(--text3);font-size:11px">-</span>';
  const paxHtml=r.pax?`<span class="mono" style="color:var(--text2)">${r.pax}명</span>`:'<span style="color:var(--text3);font-size:11px">-</span>';
  return`<tr>
    <td class="mono" style="color:var(--text3);font-size:11px">${_rowTotal-i}</td>
    <td class="mono" style="font-size:11px">${r.date||''}</td>
    <td><span style="font-family:'JetBrains Mono';font-weight:700;font-size:15px;color:var(--accent2)">R${r.room}</span></td>
    <td style="max-width:110px">${bHtml}</td>
    <td id="amt-cell-${r.id}">${amtCell(r)}</td>
    <td id="pm-cell-${r.id}">${pmCell(r)}</td>
    <td>${ctyHtml}</td>
    <td>${paxHtml}</td>
    <td style="max-width:130px">${sHtml}</td>
    <td class="mono" style="font-size:11px;color:var(--green)">${r.checkin||''}</td>
    <td class="mono" style="font-size:11px;color:var(--text3)">${r.checkout||''}</td>
    <td style="max-width:90px;color:var(--text3);font-size:11px;overflow:hidden;text-overflow:ellipsis">${r.note||''}</td>
    <td style="white-space:nowrap"><button class="edit-btn" onclick="editRecord('${r.id}')">✏</button><button class="del-btn" onclick="deleteRecord('${r.id}')">✕</button></td>
  </tr>`;
}

const EMPTY='<tr><td colspan="13" style="text-align:center;color:var(--text3);padding:26px">기록 없음</td></tr>';
function renderTable(){const r=filteredRecs('filterDate',null);renderTotalBar(r,'totalBar');document.getElementById('recordsBody').innerHTML=r.map((x,i)=>buildRow(x,i,r.length)).join('')||EMPTY;}
function renderTable2(){const r=filteredRecs('filterDate2','filterRoom2');renderTotalBar(r,'totalBar2');document.getElementById('recordsBody2').innerHTML=r.map((x,i)=>buildRow(x,i,r.length)).join('')||EMPTY;}

// INLINE AMOUNT EDIT
function inlineEditAmt(id){
  const cell=document.getElementById('amt-cell-'+id);if(!cell)return;
  cell.innerHTML=`<input class="inline-edit" type="number" placeholder="금액" id="ie-amt-${id}" autofocus> <button class="btn btn-primary btn-sm" onclick="saveInlineAmt('${id}')">저장</button>`;
  document.getElementById('ie-amt-'+id)?.focus();
}
function saveInlineAmt(id){
  const r=records.find(x=>x.id===id);if(!r)return;
  const v=+document.getElementById('ie-amt-'+id)?.value||0;
  r.total=v;
  if(r.payment==='CASH')r.cash=v;else if(r.payment==='CARD')r.card=v;else if(r.payment==='UPI')r.upi=v;
  saveRecordDB(r);showToast('✓ 금액 저장됨');
}

// INLINE PAYMENT EDIT
const PM_OPTIONS=['CASH','CARD','UPI','MIX'];
function inlineEditPm(id){
  const cell=document.getElementById('pm-cell-'+id);if(!cell)return;
  cell.innerHTML=PM_OPTIONS.map(p=>`<button class="btn btn-ghost btn-sm" style="margin:1px;" onclick="saveInlinePm('${id}','${p}')">${p}</button>`).join('');
}
function saveInlinePm(id,pm){
  const r=records.find(x=>x.id===id);if(!r)return;
  r.payment=pm;
  if(pm==='CASH'){r.cash=r.total;r.card=0;r.upi=0;}
  else if(pm==='CARD'){r.card=r.total;r.cash=0;r.upi=0;}
  else if(pm==='UPI'){r.upi=r.total;r.cash=0;r.card=0;}
  saveRecordDB(r);showToast('✓ 결제 저장됨');
}

// EDIT / DELETE
function editRecord(id){
  const r=records.find(x=>x.id===id);if(!r)return;
  editId=id;selRoom=r.room;selBookers=[...(r.bookers||[])];selStaff=[...(r.staff||[])];
  selPayment=r.payment||null;selCountry=r.country||'';selPax=r.pax||0;
  refreshRoomCounts();
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  if(selPayment){const mp={CASH:'t-cash',CARD:'t-card',UPI:'t-upi',MIX:'t-mix'};document.querySelector('.'+mp[selPayment])?.classList.add('active');}
  document.getElementById('mixWrap').style.display=selPayment==='MIX'?'block':'none';
  if(selPayment==='MIX'){document.getElementById('amtCash').value=r.cash||'';document.getElementById('amtCard').value=r.card||'';document.getElementById('amtUPI').value=r.upi||'';document.getElementById('amtTotal').value=r.total||'';}
  else{document.getElementById('amtSingle').value=r.total||'';}
  document.querySelectorAll('.cty-btn').forEach(b=>b.classList.toggle('active',b.dataset.v===selCountry));
  buildPaxGrid();
  document.getElementById('checkinTime').value=r.checkin||'';document.getElementById('checkoutTime').value=r.checkout||'';
  document.getElementById('noteField').value=r.note||'';document.getElementById('entryDate').value=r.date||'';
  document.getElementById('bookerSearch').value='';document.getElementById('staffSearch').value='';
  renderPickers();window.scrollTo(0,0);showToast('✏ 수정 모드');
}
function deleteRecord(id){
  const r=records.find(x=>x.id===id);_pdid=id;
  document.getElementById('modalBody').textContent=`R${r.room} | ${r.date} | ${r.total?r.total.toLocaleString():'미입력'} 를 삭제하시겠습니까?`;
  document.getElementById('modalConfirm').onclick=()=>{deleteRecordDB(_pdid);closeModal();showToast('🗑 삭제 완료');};
  document.getElementById('confirmModal').classList.add('show');
}
function closeModal(){document.getElementById('confirmModal').classList.remove('show');}

// SUMMARY
function renderSummary(){
  const date=document.getElementById('filterDate3').value;
  const recs=records.filter(r=>!date||r.date===date);
  const tot=recs.reduce((s,r)=>s+r.total,0),cash=recs.reduce((s,r)=>s+r.cash,0),card=recs.reduce((s,r)=>s+r.card,0),upi=recs.reduce((s,r)=>s+r.upi,0);
  const wk=recs.filter(r=>r.booking==='WALKIN').length,p1=recs.filter(r=>r.booking==='1P').length,p2=recs.filter(r=>r.booking==='2P').length;
  const rd=[];for(let i=1;i<=9;i++){const rs=recs.filter(r=>r.room==i);if(rs.length)rd.push({r:i,t:rs.reduce((s,r)=>s+r.total,0),c:rs.length});}rd.sort((a,b)=>b.t-a.t);
  // country stats
  const ctyMap={};COUNTRIES.forEach(c=>{const rs=recs.filter(r=>r.country===c);if(rs.length)ctyMap[c]={cnt:rs.length,tot:rs.reduce((s,r)=>s+r.total,0)};});
  const pct=v=>tot?Math.round(v/tot*100):0;
  document.getElementById('summaryContent').innerHTML=`
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">총 매출</div><div class="stat-value" style="color:var(--accent2)">${tot.toLocaleString()}</div><div class="stat-sub">${recs.length}건</div></div>
    <div class="stat-card"><div class="stat-label">CASH</div><div class="stat-value" style="color:var(--green)">${cash.toLocaleString()}</div><div class="stat-sub">${pct(cash)}%</div></div>
    <div class="stat-card"><div class="stat-label">CARD</div><div class="stat-value" style="color:var(--blue)">${card.toLocaleString()}</div><div class="stat-sub">${pct(card)}%</div></div>
    <div class="stat-card"><div class="stat-label">UPI</div><div class="stat-value" style="color:var(--yellow)">${upi.toLocaleString()}</div><div class="stat-sub">${pct(upi)}%</div></div>
    <div class="stat-card"><div class="stat-label">1P 부킹</div><div class="stat-value" style="color:var(--green)">${p1}</div><div class="stat-sub">건</div></div>
    <div class="stat-card"><div class="stat-label">2P 부킹</div><div class="stat-value" style="color:var(--blue)">${p2}</div><div class="stat-sub">건</div></div>
    <div class="stat-card"><div class="stat-label">WALKIN</div><div class="stat-value" style="color:#c084fc">${wk}</div><div class="stat-sub">건</div></div>
    <div class="stat-card"><div class="stat-label">평균 단가</div><div class="stat-value" style="color:var(--text)">${recs.length?Math.round(tot/recs.length).toLocaleString():0}</div><div class="stat-sub">per 건</div></div>
  </div>
  <div class="sum-sec"><div class="sum-sec-title">나라별</div><div style="display:flex;gap:8px;flex-wrap:wrap;">${COUNTRIES.map(c=>ctyMap[c]?`<div class="room-pill"><span style="font-family:'JetBrains Mono';font-weight:700;color:var(--blue)">${c}</span><span style="font-family:'JetBrains Mono';color:var(--green)">${ctyMap[c].tot.toLocaleString()}</span><span style="font-size:11px;color:var(--text3)">${ctyMap[c].cnt}건</span></div>`:'').join('')||'<span style="color:var(--text3)">없음</span>'}</div></div>
  <div class="sum-sec"><div class="sum-sec-title">룸별 매출</div><div class="room-pills">${rd.map(d=>`<div class="room-pill"><span style="font-family:'JetBrains Mono';font-weight:700;color:var(--text2)">R${d.r}</span><span style="font-family:'JetBrains Mono';color:var(--green)">${d.t.toLocaleString()}</span><span style="font-size:11px;color:var(--text3)">${d.c}건</span></div>`).join('')||'<span style="color:var(--text3)">없음</span>'}</div></div>
  <div class="sum-sec"><div class="sum-sec-title">결제 비율</div>
    <div style="display:flex;gap:14px;font-family:'JetBrains Mono',monospace;margin-bottom:9px;">
      <span style="color:var(--green)">CASH ${pct(cash)}%</span><span style="color:var(--blue)">CARD ${pct(card)}%</span><span style="color:var(--yellow)">UPI ${pct(upi)}%</span>
    </div>
    <div style="display:flex;height:15px;border-radius:6px;overflow:hidden;gap:2px;">
      <div style="background:var(--green);width:${pct(cash)}%;min-width:${cash?3:0}px"></div>
      <div style="background:var(--blue);width:${pct(card)}%;min-width:${card?3:0}px"></div>
      <div style="background:var(--yellow);width:${pct(upi)}%;min-width:${upi?3:0}px"></div>
    </div>
  </div>`;
}

// STAFF STATS
function renderStaffStats(){
  const date=document.getElementById('filterDate4').value;
  const recs=records.filter(r=>!date||r.date===date);

  // separate booker map and selection map
  const bMap={},sMap={};
  recs.forEach(r=>{
    (r.bookers||[]).forEach(s=>{
      if(!s||s==='WALKIN')return;
      if(!bMap[s])bMap[s]={cnt:0,tot:0};
      bMap[s].cnt++;bMap[s].tot+=r.total;
    });
    (r.staff||[]).forEach(s=>{
      if(!s)return;
      if(!sMap[s])sMap[s]={cnt:0,tot:0};
      sMap[s].cnt++;sMap[s].tot+=r.total;
    });
  });

  const bSorted=Object.entries(bMap).sort((a,b)=>b[1].cnt-a[1].cnt);
  const sSorted=Object.entries(sMap).sort((a,b)=>b[1].cnt-a[1].cnt);

  const bCard=([s,d])=>`<div class="ss-card">
    <div class="ss-name">${managerList.includes(s)?'🌟':''}${s}</div>
    <div class="ss-val">${d.tot.toLocaleString()}</div>
    <div class="ss-cnt">${d.cnt}건</div>
  </div>`;
  const sCard=([s,d])=>`<div class="ss-card">
    <div class="ss-name">${managerList.includes(s)?'🌟':''}${s}</div>
    <div class="ss-val">${d.tot.toLocaleString()}</div>
    <div class="ss-cnt">${d.cnt}건</div>
  </div>`;

  let html='';
  if(bSorted.length){
    const bMgr=bSorted.filter(([s])=>managerList.includes(s));
    const bStaff=bSorted.filter(([s])=>!managerList.includes(s));
    html+=`<div class="sum-sec"><div class="sum-sec-title">📌 부킹자 통계</div>`;
    if(bMgr.length)html+=`<div style="font-size:10px;color:var(--text3);margin-bottom:5px;font-family:'JetBrains Mono'">MANAGER</div><div class="ss-grid" style="margin-bottom:10px">${bMgr.map(bCard).join('')}</div>`;
    if(bStaff.length)html+=`<div style="font-size:10px;color:var(--text3);margin-bottom:5px;font-family:'JetBrains Mono'">STAFF</div><div class="ss-grid">${bStaff.map(bCard).join('')}</div>`;
    html+=`</div>`;
  }
  if(sSorted.length){
    const sMgr=sSorted.filter(([s])=>managerList.includes(s));
    const sStaff=sSorted.filter(([s])=>!managerList.includes(s));
    html+=`<div class="sum-sec"><div class="sum-sec-title">💜 셀렉션 통계</div>`;
    if(sMgr.length)html+=`<div style="font-size:10px;color:var(--text3);margin-bottom:5px;font-family:'JetBrains Mono'">MANAGER</div><div class="ss-grid" style="margin-bottom:10px">${sMgr.map(sCard).join('')}</div>`;
    if(sStaff.length)html+=`<div style="font-size:10px;color:var(--text3);margin-bottom:5px;font-family:'JetBrains Mono'">STAFF</div><div class="ss-grid">${sStaff.map(sCard).join('')}</div>`;
    html+=`</div>`;
  }
  if(!bSorted.length&&!sSorted.length)html='<div style="color:var(--text3);padding:20px">데이터 없음</div>';
  document.getElementById('staffStatsContent').innerHTML=html;
}

// STAFF MANAGE
function renderManageGrid(){
  const g=document.getElementById('staffManageGrid');g.innerHTML='';
  const sorted=[...staffList].sort((a,b)=>{
    if(a==='WALKIN')return -1;if(b==='WALKIN')return 1;
    return a.localeCompare(b);
  });
  sorted.forEach(s=>{
    const isMgr=managerList.includes(s),isWk=s==='WALKIN';
    const d=document.createElement('div');
    d.className='mg-item'+(isWk?' is-walkin':isMgr?' is-manager':'');
    d.innerHTML=`<span class="mg-name">${isWk?'🚶':isMgr?'🌟':''}${s}</span>${isWk?'':`<button class="del-s-btn" onclick="removeStaff('${s.replace(/'/g,"\\'")}')">×</button>`}`;
    g.appendChild(d);
  });
}
function addStaff(){
  const name=document.getElementById('newStaffName').value.trim().toUpperCase();
  const isMgr=document.getElementById('newStaffMgr').checked;
  if(!name){showToast('⚠ 이름을 입력해주세요');return;}
  if(staffList.includes(name)){showToast('⚠ 이미 존재');return;}
  staffList.push(name);
  // sort alphabetically, WALKIN always first
  staffList.sort((a,b)=>{if(a==='WALKIN')return -1;if(b==='WALKIN')return 1;return a.localeCompare(b);});
  if(isMgr)managerList.push(name);
  saveStaffDB();renderManageGrid();renderPickers();
  document.getElementById('newStaffName').value='';document.getElementById('newStaffMgr').checked=false;
  showToast(`✓ ${name} 추가됨`);
}
function removeStaff(name){
  _pdid=name;
  document.getElementById('modalBody').textContent=`"${name}"을 삭제하시겠습니까?`;
  document.getElementById('modalConfirm').onclick=()=>{staffList=staffList.filter(s=>s!==name);managerList=managerList.filter(s=>s!==name);saveStaffDB();renderManageGrid();renderPickers();closeModal();showToast(`🗑 ${name} 삭제됨`);};
  document.getElementById('confirmModal').classList.add('show');
}

// TABS
const TABS=['entry','records','summary','staffstats','manage'];
function switchTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',TABS[i]===n));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+n).classList.add('active');
  if(n==='records')renderTable2();
  if(n==='summary')renderSummary();
  if(n==='staffstats')renderStaffStats();
  if(n==='manage')renderManageGrid();
}

// EXPORT
function buildTSV(){
  const h=['날짜','룸','부킹자','부킹','나라','인원','금액','결제','CASH','CARD','UPI','셀렉션','체크인','체크아웃','메모'].join('\t');
  const rows=[...records].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).map((r,i)=>[r.date||'','R'+r.room,(r.bookers||[]).join('/'),r.booking||'',r.country||'',r.pax||'',r.total,r.payment||'',r.cash||'',r.card||'',r.upi||'',(r.staff||[]).join(', '),r.checkin||'',r.checkout||'',r.note||''].join('\t'));
  return[h,...rows].join('\n');
}
function exportToClipboard(){navigator.clipboard.writeText(buildTSV()).then(()=>showToast('📋 클립보드에 복사됨')).catch(()=>showToast('⚠ 복사 실패'));}
function downloadExport(){
  // Build data array for SheetJS
  const headers=['날짜','룸','부킹자','부킹','나라','인원','금액','결제','CASH','CARD','UPI','셀렉션','체크인','체크아웃','메모'];
  const rows=[...records].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).map(r=>[
    String(r.date||''),'R'+r.room,Array.isArray(r.bookers)?r.bookers.join('/'):String(r.bookers||''),
    String(r.booking||''),String(r.country||''),Number(r.pax||0),
    Number(r.total||0),String(r.payment||''),Number(r.cash||0),Number(r.card||0),Number(r.upi||0),
    Array.isArray(r.staff)?r.staff.join(', '):String(r.staff||''),
    String(r.checkin||''),String(r.checkout||''),String(r.note||'')
  ]);
  const wsData=[headers,...rows];
  const XLSX=window.XLSX;
  if(!XLSX){showToast('⚠ 엑셀 라이브러리 로딩 중... 잠시 후 다시 시도해주세요');return;}
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  // Column widths
  ws['!cols']=[{wch:12},{wch:6},{wch:18},{wch:8},{wch:6},{wch:6},{wch:10},{wch:8},{wch:10},{wch:10},{wch:10},{wch:30},{wch:8},{wch:8},{wch:20}];
  // Style header row bold
  headers.forEach((_,i)=>{
    const cell=XLSX.utils.encode_cell({r:0,c:i});
    if(ws[cell]) ws[cell].s={font:{bold:true},fill:{fgColor:{rgb:'1a1a4a'}}};
  });
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'매출장부',ws);
  XLSX.writeFile(wb,`매출장부_${new Date().toISOString().split('T')[0]}.xlsx`);
  showToast('⬇ 엑셀 다운로드 시작');
}

// TOAST
function showToast(msg){clearTimeout(_tt);document.querySelectorAll('.toast').forEach(e=>e.remove());const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);_tt=setTimeout(()=>el.remove(),2400);}


// expose all functions to window for onclick= compatibility
Object.assign(window,{
  switchTab,selectRoom,setPax,setCountry,setPayment,calcTotal,
  submitEntry,resetForm,editRecord,deleteRecord,closeModal,
  inlineEditAmt,saveInlineAmt,inlineEditPm,saveInlinePm,
  addStaff,removeStaff,renderManageGrid,
  toggleBooker,toggleStaff,renderPickers,
  exportToClipboard,downloadExport,showToast
});

init();

if('serviceWorker' in navigator){

    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
